    <div style="padding: 60px 8%; max-width: 1400px; margin: 0 auto;">

        <!-- Grid Galérie -->
        <div id="gallery-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px;">

            </div>
            <div class="gallery-item" onclick="openLightbox(1)" style="position: relative; height: 300px; overflow: hidden; cursor: pointer; background: #161616;">

            <div class="gallery-item" onclick="openLightbox(2)" style="position: relative; height: 300px; overflow: hidden; cursor: pointer; background: #161616;">

            <div class="gallery-item" onclick="openLightbox(4)" style="position: relative; height: 300px; overflow: hidden; cursor: pointer; background: #161616;">

            </div>
        </div>
    </div>

    <!-- Lightbox (Modálne okno) -->
    <div id="lightbox" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 2000; justify-content: center; align-items: center; cursor: default;">
        
        <!-- Zavrieť (kliknutím na pozadie alebo X) -->
        <div onclick="closeLightbox()" style="position: absolute; width: 100%; height: 100%; z-index: -1;"></div>
        <span onclick="closeLightbox()" style="position: absolute; top: 20px; right: 30px; color: #fff; font-size: 50px; cursor: pointer; font-weight: 200; line-height: 1;">&times;</span>

        <!-- Šípka Doľava -->
        <div onclick="prevImage()" style="position: absolute; left: 20px; color: white; font-size: 60px; cursor: pointer; user-select: none; padding: 20px;">&#8249;</div>

        <!-- Obrázok -->
        <img id="lightbox-img" src="" style="max-width: 85%; max-height: 85vh; border: 1px solid #333; object-fit: contain; box-shadow: 0 0 30px rgba(0,0,0,0.5);">

        <!-- Šípka Doprava -->
        <div onclick="nextImage()" style="position: absolute; right: 20px; color: white; font-size: 60px; cursor: pointer; user-select: none; padding: 20px;">&#8250;</div>
    </div>

    <footer style="text-align: center; padding: 40px; font-size: 12px; color: #888; border-top: 1px solid #111; margin-top: 50px;">
        &copy; 2025 ERGO GYM BRATISLAVA
    </footer>

    <script>
        // Zoznam URL adries obrázkov
        const images = [
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094522-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102851-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102951-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102828-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102937-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094622-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_093239-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094634-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102803-1536x1153.jpg"
        ];

        let currentIndex = 0;

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function updateLightbox() {
            const img = document.getElementById('lightbox-img');
            img.src = images[currentIndex];
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            updateLightbox();
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateLightbox();
        }

        // Ovládanie šípkami na klávesnici
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === "ArrowRight") nextImage();
                if (e.key === "ArrowLeft") prevImage();
                if (e.key === "Escape") closeLightbox();
            }
        });
    </script>

</body>
