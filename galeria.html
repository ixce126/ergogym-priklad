<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galéria | ERGO GYM</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Import fontu Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* CSS INTERNE V SÚBORE */
        :root {
            --primary: #fefb00;
            --black: #0a0a0a;
            --dark-grey: #161616;
            --white: #ffffff;
            --text-muted: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            overflow-x: hidden;
        }

        /* Navigácia */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: var(--black);
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav .logo {
            font-weight: 900;
            font-size: 24px;
            text-decoration: none;
            color: var(--white);
            text-transform: uppercase;
        }

        nav .logo span { color: var(--primary); }

        nav ul { display: flex; list-style: none; gap: 25px; }

        nav ul li a {
            color: var(--white);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav ul li a:hover { color: var(--primary); }

        /* Galéria Sekcia */
        .gallery-container {
            padding: 60px 8%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .gallery-header h2 {
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .gallery-header h2 span { color: var(--primary); }

        .gallery-header p {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            position: relative;
            height: 300px;
            overflow: hidden;
            cursor: pointer;
            background: var(--dark-grey);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, opacity 0.3s ease;
            opacity: 0.9;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
            opacity: 1;
        }

        /* Lightbox (Modálne okno) */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 85vh;
            border: 1px solid #333;
            object-fit: contain;
        }

        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: var(--white);
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid #111;
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
            nav { flex-direction: column; gap: 15px; padding: 15px; }
            .gallery-header h2 { font-size: 30px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">ERGO <span>GYM</span></a>
        <ul>
            <li><a href="index.html">Domov</a></li>
            <li><a href="galeria.html">Galéria</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>

    <div class="gallery-container">
        <div class="gallery-header">
            <h2>Naša <span>Galéria</span></h2>
            <p>Kliknite na fotku pre detailný pohľad</p>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094522-1536x1153.jpg" alt="ErgoGym">
            </div>
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102851-1536x1153.jpg" alt="ErgoGym">
            </div>
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102951-1536x1153.jpg" alt="ErgoGym">
            </div>
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102828-1536x1153.jpg" alt="ErgoGym">
            </div>
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102937-1536x1153.jpg" alt="ErgoGym">
            </div>
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094622-1536x1153.jpg" alt="ErgoGym">
            </div>
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_093239-1536x1153.jpg" alt="ErgoGym">
            </div>
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094634-1536x1153.jpg" alt="ErgoGym">
            </div>
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102803-1536x1153.jpg" alt="ErgoGym">
            </div>
        </div>
    </div>

    <!-- Lightbox element -->
    <div id="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <footer>
        &copy; 2025 ERGO GYM BRATISLAVA
    </footer>

    <script>
        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Zákaz scrollovania
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto'; // Povolenie scrollovania
        }
    </script>

</body>
</html>
