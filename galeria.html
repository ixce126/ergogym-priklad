<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galéria | ERGO GYM</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; background-color: #0a0a0a; color: #ffffff; overflow-x: hidden;">

    <!-- Navigácia -->
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: #0a0a0a; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000;">
        <a href="index.html" style="font-weight: 900; font-size: 24px; text-decoration: none; color: #ffffff; text-transform: uppercase;">
            ERGO <span style="color: #fefb00;">GYM</span>
        </a>
        <ul style="display: flex; list-style: none; gap: 25px; margin: 0; padding: 0;">
            <li><a href="index.html" style="color: #ffffff; text-decoration: none; text-transform: uppercase; font-size: 13px; font-weight: 700; letter-spacing: 1px;">Domov</a></li>
            <li><a href="galeria.html" style="color: #fefb00; text-decoration: none; text-transform: uppercase; font-size: 13px; font-weight: 700; letter-spacing: 1px;">Galéria</a></li>
            <li><a href="kontakt.html" style="color: #ffffff; text-decoration: none; text-transform: uppercase; font-size: 13px; font-weight: 700; letter-spacing: 1px;">Kontakt</a></li>
        </ul>
    </nav>

    <div style="padding: 60px 8%; max-width: 1400px; margin: 0 auto;">
        <div style="text-align: center; margin-bottom: 50px;">
            <h2 style="font-size: 42px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin: 0;">Naša <span style="color: #fefb00;">Galéria</span></h2>
            <p style="color: #888; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; margin-top: 5px;">Kliknite na fotku pre detailný pohľad</p>
        </div>

        <!-- Grid Galérie -->
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px;">
            <div onclick="openLightbox(0)" style="height: 300px; overflow: hidden; cursor: pointer; background: #161616;">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094522-1536x1153.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div onclick="openLightbox(1)" style="height: 300px; overflow: hidden; cursor: pointer; background: #161616;">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102851-1536x1153.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div onclick="openLightbox(2)" style="height: 300px; overflow: hidden; cursor: pointer; background: #161616;">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102951-1536x1153.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div onclick="openLightbox(3)" style="height: 300px; overflow: hidden; cursor: pointer; background: #161616;">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102828-1536x1153.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div onclick="openLightbox(4)" style="height: 300px; overflow: hidden; cursor: pointer; background: #161616;">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102937-1536x1153.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div onclick="openLightbox(5)" style="height: 300px; overflow: hidden; cursor: pointer; background: #161616;">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094622-1536x1153.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div onclick="openLightbox(6)" style="height: 300px; overflow: hidden; cursor: pointer; background: #161616;">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_093239-1536x1153.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div onclick="openLightbox(7)" style="height: 300px; overflow: hidden; cursor: pointer; background: #161616;">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094634-1536x1153.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div onclick="openLightbox(8)" style="height: 300px; overflow: hidden; cursor: pointer; background: #161616;">
                <img src="https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102803-1536x1153.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 2000; justify-content: center; align-items: center; cursor: default; backdrop-filter: blur(5px);">
        
        <div onclick="closeLightbox()" style="position: absolute; width: 100%; height: 100%; z-index: -1;"></div>
        <span onclick="closeLightbox()" style="position: absolute; top: 25px; right: 35px; color: #fff; font-size: 40px; cursor: pointer; font-weight: 200; z-index: 2100; opacity: 0.7;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">&times;</span>

        <!-- Tlačidlo Doľava -->
        <div onclick="prevImage()" style="position: absolute; left: 30px; width: 64px; height: 64px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; user-select: none; z-index: 2100; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">
            <span style="font-size: 44px; position: relative; top: -3px; left: -1px; pointer-events: none;">&#8249;</span>
        </div>

        <!-- Obrázok (Svižný Fade) -->
        <img id="lightbox-img" src="" style="max-width: 80%; max-height: 80vh; border: 1px solid #333; object-fit: contain; box-shadow: 0 10px 40px rgba(0,0,0,0.8); opacity: 1; transition: opacity 0.15s ease-in-out;">

        <!-- Tlačidlo Doprava -->
        <div onclick="nextImage()" style="position: absolute; right: 30px; width: 64px; height: 64px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; user-select: none; z-index: 2100; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">
            <span style="font-size: 44px; position: relative; top: -3px; left: 1px; pointer-events: none;">&#8250;</span>
        </div>
    </div>

    <footer style="text-align: center; padding: 40px; font-size: 12px; color: #888; border-top: 1px solid #111; margin-top: 50px;">
        &copy; 2025 ERGO GYM BRATISLAVA
    </footer>

    <script>
        const images = [
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094522-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102851-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102951-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102828-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102937-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094622-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_093239-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_094634-1536x1153.jpg",
            "https://www.ergogym.sk/wp-content/uploads/2022/08/IMG_20220801_102803-1536x1153.jpg"
        ];

        let currentIndex = 0;
        let isAnimating = false;

        function openLightbox(index) {
            currentIndex = index;
            const img = document.getElementById('lightbox-img');
            img.style.opacity = '1';
            img.src = images[currentIndex];
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function updateImage(newIndex) {
            if (isAnimating) return;
            isAnimating = true;

            const img = document.getElementById('lightbox-img');
            img.style.opacity = '0';

            setTimeout(() => {
                currentIndex = newIndex;
                img.src = images[currentIndex];

                img.onload = () => {
                    img.style.opacity = '1';
                    isAnimating = false;
                };

                if (img.complete) {
                    img.style.opacity = '1';
                    isAnimating = false;
                }
            }, 150); // Zrýchlený čas (zhoda s 0.15s transition)
        }

        function nextImage() { updateImage((currentIndex + 1) % images.length); }
        function prevImage() { updateImage((currentIndex - 1 + images.length) % images.length); }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === "ArrowRight") nextImage();
                if (e.key === "ArrowLeft") prevImage();
                if (e.key === "Escape") closeLightbox();
            }
        });
    </script>
</body>
</html>
