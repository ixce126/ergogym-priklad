<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | ERGO GYM</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Font Awesome pre sociálne ikony -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #fefb00;
            --dark: #111111;
            --light-grey: #333333;
            --white: #ffffff;
            --text-grey: #cccccc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid var(--light-grey);
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            text-decoration: none;
            color: var(--white);
            text-transform: uppercase;
        }

        .logo span { color: var(--primary); }

        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 30px; }
        nav ul li a { text-decoration: none; color: var(--white); font-weight: 500; transition: 0.3s; }
        nav ul li a:hover { color: var(--primary); }

        section {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        h2 {
            font-size: 36px;
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: stretch;
        }

        .hours-card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            height: 100%;
            position: relative; /* Nutné pre absolútne poziciovanie ikon vo vnútri */
        }

        /* Sociálne ikony v pravom dolnom rohu */
        .social-icons {
            position: absolute;
            bottom: 25px;
            right: 25px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: #222;
            color: var(--white);
            text-decoration: none;
            border-radius: 10px;
            font-size: 22px;
            transition: 0.3s ease;
            border: 1px solid var(--light-grey);
        }

        .social-icon:hover {
            background: var(--primary);
            color: var(--dark);
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .form-container {
            position: relative;
            height: 100%;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #success-message {
            display: none;
            padding: 40px;
            background: #1a1a1a;
            border-radius: 15px;
            border: 2px solid var(--primary);
            text-align: center;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        .checkmark-icon {
            width: 80px;
            height: 80px;
            fill: var(--primary);
            margin-bottom: 20px;
        }

        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 15px;
            background: #222;
            border: 1px solid var(--light-grey);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .contact-form textarea {
            flex-grow: 1;
            resize: none;
        }

        .btn-submit {
            background: var(--primary);
            color: #000;
            padding: 18px;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            filter: brightness(0.9);
        }

        @media (max-width: 768px) {
            .contact-wrapper { grid-template-columns: 1fr; }
            .contact-form textarea { height: 250px; }
            nav { flex-direction: column; gap: 15px; }
            nav ul li { margin: 0 10px; }
            /* Na mobiloch ich vrátime do toku, aby neprekrývali text, ak je div malý */
            .social-icons { position: static; margin-top: 30px; justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">ERGO <span>GYM</span></a>
        <ul>
            <li><a href="index.html">Domov</a></li>
            <li><a href="galeria.html">Galéria</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>

    <section>
        <h2>Kontaktujte nás</h2>
        <div class="contact-wrapper">
            <div class="contact-info">
                <div class="hours-card">
                    <!-- Text, ktorý normálne vypĺňa div -->
                    <h3 style="color: var(--primary); margin-bottom: 10px;">KDE NÁS NÁJDETE?</h3>
                    <p style="font-size: 18px; font-weight: 700; margin-bottom: 25px;">Kazanská 4, 821 06 Podunajské Biskupice</p>
                    
                    <h3 style="color: var(--primary); margin-bottom: 5px;">TELEFÓN</h3>
                    <p style="font-size: 18px; font-weight: 700; margin-bottom: 25px;">0902 696 732</p>

                    <h3 style="color: var(--primary); margin-bottom: 5px;">EMAIL</h3>
                    <p style="font-size: 18px; font-weight: 700;">info@ergogym.sk</p>

                    <!-- Ikony v rohu - nijak neovplyvňujú text hore -->
                    <div class="social-icons">
                        <a href="https://www.facebook.com/ergogym4" target="_blank" class="social-icon" title="Facebook">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a href="https://www.instagram.com/ergo_gym/" target="_blank" class="social-icon" title="Instagram">
                            <i class="fab fa-instagram"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="form-container">
                <div id="success-message">
                    <svg class="checkmark-icon" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                    <h3 style="color: var(--primary); text-transform: uppercase;">Ďakujeme!</h3>
                    <p style="font-size: 18px; font-weight: 600;">Správa bola úspešne odoslaná.</p>
                </div>

                <form id="contact-form" class="contact-form">
                    <input type="text" name="meno" placeholder="Vaše meno" required>
                    <input type="email" name="email" placeholder="Váš Email" required>
                    <textarea name="sprava" placeholder="Vaša správa..." required></textarea>
                    <button type="submit" class="btn-submit">Odoslať správu</button>
                </form>
            </div>
        </div>
        
        <div style="margin-top: 50px; height: 400px; border-radius: 20px; overflow: hidden; border: 1px solid var(--light-grey);">
            <iframe style="filter: invert(90%) hue-rotate(180deg)" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2663.784776100236!2d17.2023537!3d48.1143896!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x476c88ca4d92416f%3A0x6b4c102a90100902!2sKazansk%C3%A1%204!5e0!3m2!1ssk!2ssk!4v1700000000000" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

    <footer style="text-align: center; padding: 30px; color: #555; font-size: 13px;">
        &copy; 2026 ERGO GYM BRATISLAVA | Všetky práva vyhradené.
    </footer>

    <script>
        window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
        formspree('initForm', { 
            formElement: '#contact-form', 
            formId: 'xkopdvwl',
            onSuccess: function() {
                document.getElementById('contact-form').style.display = 'none';
                const successMsg = document.getElementById('success-message');
                successMsg.style.display = 'flex';
            }
        });
    </script>
    <script src="https://unpkg.com/@formspree/ajax@1" defer></script>

</body>
</html>
