<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | ERGO GYM</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Definícia farieb a základných nastavení */
        :root {
            --primary: #ff4d00; /* Oranžová farba gymu */
            --dark: #111111;
            --light-grey: #333333;
            --white: #ffffff;
            --text-grey: #cccccc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            line-height: 1.6;
        }

        /* Navigácia */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid var(--light-grey);
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            text-decoration: none;
            color: var(--white);
            text-transform: uppercase;
        }

        .logo span {
            color: var(--primary);
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--white);
            font-weight: 500;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: var(--primary);
        }

        /* Hlavná sekcia */
        section {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        h2 {
            font-size: 36px;
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        /* Kontaktné informácie */
        .hours-card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            border-left: 5px solid var(--primary);
        }

        /* Formulár */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-form input, 
        .contact-form textarea {
            width: 100%;
            padding: 15px;
            background: #222;
            border: 1px solid var(--light-grey);
            color: white;
            border-radius: 8px;
            font-size: 16px;
        }

        .contact-form input:focus, 
        .contact-form textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }

        .btn-submit:hover {
            background: #e64500;
            transform: translateY(-2px);
        }

        /* Responzivita */
        @media (max-width: 768px) {
            .contact-wrapper {
                grid-template-columns: 1fr;
            }
            nav {
                flex-direction: column;
                gap: 15px;
            }
            nav ul li {
                margin: 0 15px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">ERGO <span>GYM</span></a>
        <ul>
            <li><a href="index.html">Domov</a></li>
            <li><a href="galeria.html">Galéria</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>

    <section>
        <h2>Kontaktujte nás</h2>
        <div class="contact-wrapper">
            <div class="contact-info">
                <div class="hours-card">
                    <h3 style="color: var(--primary); margin-bottom: 20px;">KDE NÁS NÁJDETE?</h3>
                    <p style="font-size: 20px; font-weight: 700;">Kazanská 4, 821 06 Bratislava</p>
                    <p style="margin-bottom: 25px; color: var(--text-grey);">Podunajské Biskupice</p>
                    
                    <h3 style="color: var(--primary); margin-bottom: 10px;">TELEFÓN</h3>
                    <p style="font-size: 20px; font-weight: 700; margin-bottom: 25px;">0902 696 732</p>

                    <h3 style="color: var(--primary); margin-bottom: 10px;">EMAIL</h3>
                    <p style="font-size: 20px; font-weight: 700;">info@ergogym.sk</p>
                </div>
            </div>

            <form class="contact-form">
                <input type="text" placeholder="Vaše meno" required>
                <input type="email" placeholder="Váš Email" required>
                <!-- Predmet správy bol odstránený -->
                <textarea rows="10" placeholder="Vaša správa..." required></textarea>
                <button type="submit" class="btn-submit">Odoslať správu</button>
            </form>
        </div>
        
        <div style="margin-top: 50px; height: 400px; border-radius: 20px; overflow: hidden; border: 1px solid var(--light-grey);">
            <iframe style="filter: invert(90%) hue-rotate(180deg)" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2663.784776100236!2d17.2023537!3d48.1143896!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x476c88ca4d92416f%3A0x6b4c102a90100902!2sKazansk%C3%A1%204!5e0!3m2!1ssk!2ssk!4v1700000000000" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>
</body>
</html>
