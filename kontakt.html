<body>
    <nav>
        <a href="index.html" class="logo">ERGO <span>GYM</span></a>
        <ul>
            <li><a href="index.html">Domov</a></li>
            <li><a href="otvaracie-hodiny.html">Otváracie hodiny</a></li>
            <li><a href="galeria.html">Galéria</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>

    <section>
        <h2>Kontaktujte nás</h2>
        <div class="contact-wrapper">
            <div class="contact-info">
                <div class="hours-card" style="margin: 0; width: 100%; padding: 30px;">
                    <h3 style="color: var(--primary); margin-bottom: 20px;">KDE NÁS NÁJDETE?</h3>
                    <p style="font-size: 20px; font-weight: 700;">Kazanská 4, 821 06 Bratislava</p>
                    <p style="margin-bottom: 20px;">Podunajské Biskupice</p>
                    
                    <h3 style="color: var(--primary); margin-bottom: 10px;">TELEFÓN</h3>
                    <p style="font-size: 20px; font-weight: 700; margin-bottom: 20px;">0902 696 732</p>

                    <h3 style="color: var(--primary); margin-bottom: 10px;">EMAIL</h3>
                    <p style="font-size: 20px; font-weight: 700;">info@ergogym.sk</p>
                </div>
            </div>

            <form class="contact-form">
                <input type="text" placeholder="Vaše meno" required>
                <input type="email" placeholder="Váš Email" required>
                <input type="text" placeholder="Predmet správy">
                <textarea rows="5" placeholder="Vaša správa..." required></textarea>
                <button type="submit" class="btn-submit">Odoslať správu</button>
            </form>
        </div>
        
        <div style="margin-top: 50px; height: 400px; border-radius: 20px; overflow: hidden; border: 1px solid var(--light-grey);">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2663.784776100236!2d17.2023537!3d48.1143896!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x476c88ca4d92416f%3A0x6b4c102a90100902!2sKazansk%C3%A1%204!5e0!3m2!1ssk!2ssk!4v1700000000000" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>
</body>
</html>
