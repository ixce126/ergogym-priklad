<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERGO GYM | Kontakt & Sociálne siete</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome pre ikony -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #fefb00;
            --black: #0a0a0a;
            --dark-grey: #121212;
            --white: #ffffff;
            --text-muted: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigácia */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        nav .logo {
            font-weight: 900;
            font-size: 24px;
            text-decoration: none;
            color: var(--white);
            text-transform: uppercase;
        }

        nav .logo span { color: var(--primary); }

        nav ul { display: flex; list-style: none; gap: 25px; }

        nav ul li a {
            color: var(--white);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 700;
            transition: 0.3s;
        }

        nav ul li a:hover { color: var(--primary); }

        /* Hlavný obsah */
        .content-wrapper {
            flex: 1;
            padding: 150px 8% 80px;
            text-align: center;
        }

        .section-title {
            font-size: clamp(30px, 5vw, 45px);
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .section-title span { color: var(--primary); }

        /* Sociálne Siete Sekcia */
        .social-container {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: var(--dark-grey);
            color: var(--white);
            text-decoration: none;
            font-size: 30px;
            border-radius: 50%;
            border: 1px solid #222;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            color: var(--black);
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(254, 251, 0, 0.2);
        }

        .social-link i {
            transition: transform 0.3s ease;
        }

        .social-link:hover i {
            transform: scale(1.1);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #444;
            font-size: 12px;
            background: var(--black);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 10px; padding: 15px; }
            .content-wrapper { padding-top: 180px; }
            .social-link { width: 60px; height: 60px; font-size: 24px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">ERGO <span>GYM</span></a>
        <ul>
            <li><a href="index.html">Domov</a></li>
            <li><a href="galeria.html">Galéria</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
    </nav>

    <div class="content-wrapper">
        <h1 class="section-title">Sledujte <span>Nás</span></h1>
        <p>Buďte súčasťou našej komunity a nenechajte si ujsť žiadne novinky.</p>

        <div class="social-container">
            <!-- Facebook -->
            <a href="https://www.facebook.com/ergogym4" target="_blank" class="social-link" title="Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/ergo_gym/" target="_blank" class="social-link" title="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>

    <footer>
        &copy; 2026 ERGO GYM BRATISLAVA | Všetky práva vyhradené.
    </footer>

</body>
</html>
